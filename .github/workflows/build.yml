name: Build Executables

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build
        run: uv run pyinstaller skill-linker.spec --clean --noconfirm

      - uses: actions/upload-artifact@v4
        with:
          name: skill-linker-windows
          path: dist/skill-linker.exe
          if-no-files-found: error

  build-linux-rhel:
    runs-on: ubuntu-latest
    container:
      image: rockylinux:9

    steps:
      - uses: actions/checkout@v4

      - name: Install curl and binutils
        run: dnf install -y curl binutils

      - name: Install uv + Python + build
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | env HOME=/root sh
          export PATH="/root/.local/bin:$PATH"
          uv python install 3.12
          uv sync --group dev
          uv run pyinstaller skill-linker.spec --clean --noconfirm

      - uses: actions/upload-artifact@v4
        with:
          name: skill-linker-linux-rhel9
          path: dist/skill-linker
          if-no-files-found: error

  build-linux-rhel8:
    runs-on: ubuntu-latest
    container:
      image: rockylinux:8

    steps:
      - uses: actions/checkout@v4

      - name: Install curl and binutils
        run: dnf install -y curl binutils

      - name: Install uv + Python + build
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | env HOME=/root sh
          export PATH="/root/.local/bin:$PATH"
          uv python install 3.12
          uv sync --group dev
          uv run pyinstaller skill-linker.spec --clean --noconfirm

      - uses: actions/upload-artifact@v4
        with:
          name: skill-linker-linux-rhel8
          path: dist/skill-linker
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-windows, build-linux-rhel, build-linux-rhel8]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Make Linux binaries executable
        run: |
          chmod +x artifacts/skill-linker-linux-rhel9/skill-linker
          chmod +x artifacts/skill-linker-linux-rhel8/skill-linker

      - name: Rename binaries to include platform
        run: |
          mv artifacts/skill-linker-linux-rhel9/skill-linker artifacts/skill-linker-linux-rhel9/skill-linker-rhel9
          mv artifacts/skill-linker-linux-rhel8/skill-linker artifacts/skill-linker-linux-rhel8/skill-linker-rhel8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/skill-linker-linux-rhel9/skill-linker-rhel9
            artifacts/skill-linker-linux-rhel8/skill-linker-rhel8
            artifacts/skill-linker-windows/skill-linker.exe
          generate_release_notes: true
